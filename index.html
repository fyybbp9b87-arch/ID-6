<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UMN Citizen Verification</title>

<style>
body{
    margin:0;
    background:#0b0d10;
    font-family:Arial, sans-serif;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:420px;
    background:#111418;
    border:1px solid #2bff8840;
    border-radius:20px;
    padding:30px;
    box-shadow:0 0 20px rgba(0,255,120,0.15);
}

h1{
    margin:0;
    font-size:34px;
    letter-spacing:2px;
    color:#f2f2f2;
}

.subtitle{
    color:#78d89b;
    margin-top:5px;
    margin-bottom:25px;
    letter-spacing:3px;
}

.row{
    margin-bottom:18px;
    border-bottom:1px solid #2a2f36;
    padding-bottom:10px;
}

.label{
    font-size:13px;
    color:#78d89b;
    letter-spacing:2px;
}

.value{
    font-size:24px;
    margin-top:5px;
}

.verify{
    margin-top:25px;
    text-align:center;
    background:#12301e;
    color:#7dffab;
    padding:15px;
    border-radius:12px;
    font-weight:bold;
    font-size:20px;
    border:1px solid #2bff8860;
}

.footer{
    text-align:center;
    margin-top:20px;
    color:#666;
    letter-spacing:3px;
    font-size:12px;
}
</style>
</head>

<body>

<div class="card">

<h1>UNITED MELON NATIONS</h1>
<div class="subtitle">SPECIAL HONOURED CITIZEN</div>

<div class="row">
<div class="label">FULL NAME</div>
<div class="value">Elliot Davies</div>
</div>

<div class="row">
<div class="label">ID NUMBER</div>
<div class="value">006</div>
</div>

<div class="row">
<div class="label">DATE OF BIRTH</div>
<div class="value">September 10th, 2014</div>
</div>

<div class="row">
<div class="label">NATIONALITY</div>
<div class="value">Melonish</div>
</div>

<div class="row">
<div class="label">ISSUE DATE</div>
<div class="value">2026</div>
</div>

<div class="row">
<div class="label">EXPIRY DATE</div>
<div class="value">2036</div>
</div>

<div class="verify">
✔ VERIFIED CITIZEN
</div>

<div class="footer">
UNITY • GROWTH • STRENGTH
</div>

</div>

</body>
</html>
