<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UMN Citizen Verification</title>

<style>
    body{
        margin:0;
        font-family:Arial, sans-serif;
        background:#0f1115;
        color:white;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
    }

    .card{
        width:420px;
        background:#161a20;
        border:2px solid #2dff7a33;
        border-radius:20px;
        padding:30px;
        box-shadow:0 0 25px rgba(0,255,120,0.15);
    }

    h1{
        margin:0;
        color:#7dff9c;
        font-size:32px;
        letter-spacing:2px;
    }

    .subtitle{
        color:#aaa;
        margin-bottom:25px;
    }

    .row{
        margin:14px 0;
        padding-bottom:10px;
        border-bottom:1px solid #2b2f36;
    }

    .label{
        color:#7dff9c;
        font-size:14px;
        letter-spacing:1px;
    }

    .value{
        font-size:24px;
        margin-top:4px;
    }

    .verified{
        margin-top:25px;
        text-align:center;
        background:#10361d;
        border:1px solid #2dff7a66;
        padding:15px;
        border-radius:12px;
        color:#7dff9c;
        font-weight:bold;
        font-size:20px;
    }

    .footer{
        text-align:center;
        margin-top:20px;
        color:#666;
        font-size:12px;
    }
</style>
</head>

<body>

<div class="card">

    <h1>UNITED MELON NATIONS</h1>
    <div class="subtitle">Special Honoured Citizen Verification</div>

    <div class="row">
        <div class="label">FULL NAME</div>
        <div class="value">Elliot Davies</div>
    </div>

    <div class="row">
        <div class="label">ID NUMBER</div>
        <div class="value">006</div>
    </div>

    <div class="row">
        <div class="label">STATUS</div>
        <div class="value">Special Honoured Citizen</div>
    </div>

    <div class="row">
        <div class="label">ISSUE DATE</div>
        <div class="value">2026</div>
    </div>

    <div class="row">
        <div class="label">EXPIRY DATE</div>
        <div class="value">2036</div>
    </div>

    <div class="verified">
        ✔ VERIFIED CITIZEN
    </div>

    <div class="footer">
        UMN Secure Verification System
    </div>

</div>

</body>
</html>
